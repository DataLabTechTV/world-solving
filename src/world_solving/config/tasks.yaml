# Problem Identification
problem_identification_map_global_systems:
  description: Identify interacting global systems, dependencies, and leverage points.
  agent: systems_thinker
  expected_output: structured_json

problem_identification_detect_critical_problems:
  description: Highlight the top 5–10 global problems causing the most pain.
  agent: economist
  expected_output: structured_json

problem_identification_preliminary_impact_analysis:
  description: Provide rough assessment of economic, environmental, and social impact.
  agent: public_health_expert
  expected_output: structured_json

# Solution Design
solution_design_solution_brainstorm:
  description: Generate multiple solution ideas for each identified problem.
  agent: engineering_lead
  expected_output: structured_json

solution_design_technical_feasibility:
  description: Evaluate each solution for practicality, scalability, and resource requirements.
  agent: technology_architect
  expected_output: structured_json

solution_design_behavioral_feasibility:
  description: Assess adoption likelihood and human behavior response.
  agent: behavioral_scientist
  expected_output: structured_json

# Feasibility Review
feasibility_review_political_analysis:
  description: Identify political barriers and enablers for each proposed solution.
  agent: political_strategist
  expected_output: structured_json

feasibility_review_operations_analysis:
  description: Map deployment logistics, supply chains, and operational bottlenecks.
  agent: operations_specialist
  expected_output: structured_json

feasibility_review_financial_analysis:
  description: Estimate capital requirements and funding strategies.
  agent: finance_strategist
  expected_output: structured_json

feasibility_review_risk_assessment:
  description: Identify systemic, technological, and geopolitical risks.
  agent: risk_analyst
  expected_output: structured_json

feasibility_review_ethical_review:
  description: Assess moral trade-offs and societal impact of solutions.
  agent: ethics_advisor
  expected_output: structured_json

# Integration
integration_cross_domain_synthesis:
  description: Combine insights from problem identification, solution design, and feasibility review.
  agent: integrator
  expected_output: structured_json

integration_prepare_summary_for_reporting:
  description: Create structured summaries and visualizations for the reporting agent.
  agent: integrator
  expected_output: structured_json

# Final Reporting
final_reporting_compile_final_report:
  description: >
    Generate a polished, structured report including:
      - Problem definitions
      - Root cause analysis
      - Proposed solutions
      - Feasibility assessments
      - Risks and ethical considerations
      - Implementation roadmap
  agent: reporting_analyst
  expected_output: markdown

final_reporting_executive_summary:
  description: Create a concise summary for policymakers, investors, or stakeholders.
  agent: reporting_analyst
  expected_output: markdown
